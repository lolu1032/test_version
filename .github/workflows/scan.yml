name: paper-trade-scan

on:
  schedule:
    # Every 15 minutes. GitHub may delay scheduled runs under load; that's fine
    # for a 15-minute paper strategy.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Let the job push ledger.json back to the repo, and open an issue on failure.
permissions:
  contents: write
  issues: write

# Never run two scans at once (they'd both edit ledger.json).
concurrency:
  group: paper-trade-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # don't let a hung fetch run forever
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests (gate the scanner on a green suite)
        run: python3 -m unittest discover

      - name: Run scanner (paper trade)
        env:
          STRATEGY: donchian_breakout
          STARTING_CASH: "100"
          MIN_USDT_VOLUME: "0"     # 0 = scan every coin
          MAX_POSITIONS: "5"       # capital split evenly across slots (rolls/compounds)
          TAKE_PROFIT: "0.05"      # +5% -> close
          STOP_LOSS: "0.03"        # -3% -> close
        run: python3 scanner.py

      - name: Push summary to Notion (optional)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          STRATEGY: donchian_breakout
        run: python3 notion_sync.py

      - name: Commit ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ledger.json STATUS.md
          if git diff --staged --quiet; then
            echo "No ledger changes."
          else
            git commit -m "paper-trade scan $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Open an issue if the run failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "paper-trade scan failed";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "scan-failure",
            });
            const body = `The scheduled paper-trade scan failed.\n\nRun: ${runUrl}`;
            if (issues.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["scan-failure"],
              });
            }
